<!DOCTYPE html>
<html lang="pt-BR">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Arena Bolão</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="app-shell">

    <!-- SIDEBAR -->

    <aside class="sidebar">

        <div class="sidebar-logo">

            <div class="logo-circle">
                ⚽
            </div>

            <div>

                <h2>Arena Bolão</h2>

                <small>Versão MVP</small>

            </div>

        </div>

        <nav class="sidebar-menu">

            <button class="menu-item active" data-route="home">
                🏠
                <span>Início</span>
            </button>

            <button class="menu-item" data-route="arenas">
                🏟
                <span>Minhas Arenas</span>
            </button>

            <button class="menu-item" data-route="games">
                ⚽
                <span>Jogos</span>
            </button>

            <button class="menu-item" data-route="ranking">
                🏆
                <span>Ranking</span>
            </button>

            <button class="menu-item" data-route="profile">
                👤
                <span>Perfil</span>
            </button>

        </nav>

        <button class="logout-button" data-logout>

            Sair

        </button>

    </aside>

    <!-- CONTEÚDO -->

    <main class="content">

        <!-- TOPO -->

        <header class="topbar">

            <div>

                <span class="subtitle">

                    Bem-vindo de volta

                </span>

                <h1 data-user-name>

                    Carregando...

                </h1>

            </div>

            <div class="user-box">

                <div class="avatar" data-user-avatar>

                    T

                </div>

                <span data-user-short-name>

                    Jogador

                </span>

            </div>

        </header>

        <!-- ÁREA DINÂMICA -->

        <section
            id="app"
            class="page-content"
            data-app-content>

            Carregando aplicação...

        </section>

    </main>

</div>

<!-- FIREBASE -->

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

<script src="js/firebase.js"></script>

<script src="js/dashboard.js"></script>

</body>

</html>
