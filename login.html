<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Entrar | Arena Bolão</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <main class="auth-page">
    <section class="auth-card">
      <a href="index.html" class="back-link">← Voltar</a>

      <span class="badge">🏆 Arena Bolão</span>

      <h1>Entrar no Bolão</h1>

      <p>
        Acesse sua conta para registrar palpites, acompanhar sua pontuação
        e disputar o ranking.
      </p>

      <form class="auth-form">
        <label>
          Nome
          <input type="text" placeholder="Ex: Thiago" />
        </label>

        <label>
          E-mail
          <input type="email" placeholder="seuemail@gmail.com" />
        </label>

        <label>
          Senha
          <input type="password" placeholder="Digite sua senha" />
        </label>

        <button type="button" class="btn btn-primary">
          Criar conta / Entrar
        </button>
      </form>

      <small>
        Em breve, esta tela será conectada ao Firebase Authentication.
      </small>
    </section>
  </main>
</body>
</html>
