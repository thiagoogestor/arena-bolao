<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Entrar | Arena Bolão</title>

  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <main class="auth-page">
    <section class="auth-card">
      <a href="index.html" class="back-link">← Voltar</a>

      <span class="badge">🏆 Arena Bolão</span>

      <h1>Entrar no Bolão</h1>

      <p>
        Acesse sua conta para registrar palpites, acompanhar sua pontuação
        e disputar o ranking.
      </p>

      <form class="auth-form" data-auth-form>
        <label>
          Nome
          <input data-name type="text" placeholder="Ex: Thiago" autocomplete="name" />
        </label>

        <label>
          E-mail
          <input data-email type="email" placeholder="seuemail@gmail.com" autocomplete="email" />
        </label>

        <label>
          Senha
          <input data-password type="password" placeholder="Digite sua senha" autocomplete="current-password" />
        </label>

        <button type="submit" class="btn btn-primary">
          Criar conta / Entrar
        </button>

        <div data-feedback class="auth-feedback"></div>
      </form>

      <small>
        Use nome, e-mail e senha para criar conta. Depois disso, use os mesmos dados para entrar.
      </small>
    </section>
  </main>

  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

  <script src="js/firebase.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
